syntax = "proto3";

package registry.v1;

option go_package = "registry/v1;registryv1";

service ProtocolRegistry {
  // Publish a protocol for a service
  rpc PublishProtocol(PublishProtocolRequest) returns (PublishProtocolResponse);

  // Get the current protocol for a service
  rpc GetProtocol(GetProtocolRequest) returns (GetProtocolResponse);

  // Register a consumer of a service's protocol
  rpc RegisterConsumer(RegisterConsumerRequest) returns (RegisterConsumerResponse);

  // Unregister a consumer of a service's protocol
  rpc UnregisterConsumer(UnregisterConsumerRequest) returns (UnregisterConsumerResponse);

  // Validate a protocol against existing consumers without publishing
  rpc ValidateProtocol(ValidateProtocolRequest) returns (ValidateProtocolResponse);
}

enum ProtocolType {
  PROTOCOL_TYPE_UNSPECIFIED = 0;
  PROTOCOL_TYPE_GRPC = 1;
  // Future: PROTOCOL_TYPE_OPENAPI = 2;
  // Future: PROTOCOL_TYPE_ASYNCAPI = 3;
}

message ProtoFile {
  string path = 1;
  bytes content = 2;
}

message PublishProtocolRequest {
  string service_name = 1;
  reserved 2;
  ProtocolType protocol_type = 3;
  repeated ProtoFile files = 4;
  string entry_point = 5;
  repeated string versions = 6;
}

message PublishProtocolResponse {
  string service_name = 1;
  bool is_new = 2;
}

message GetProtocolRequest {
  string service_name = 1;
  ProtocolType protocol_type = 2;
  string version = 3;
}

message GetProtocolResponse {
  string service_name = 1;
  ProtocolType protocol_type = 2;
  reserved 3;
  repeated ProtoFile files = 4;
  string entry_point = 5;
}

message RegisterConsumerRequest {
  string consumer_name = 1;
  string server_name = 2;
  ProtocolType protocol_type = 3;
  reserved 4;
  repeated ProtoFile files = 5;
  string entry_point = 6;
  repeated string server_versions = 7;
}

message RegisterConsumerResponse {
  string consumer_name = 1;
  string server_name = 2;
  bool is_new = 3;
}

message UnregisterConsumerRequest {
  string consumer_name = 1;
  string server_name = 2;
  ProtocolType protocol_type = 3;
  repeated string server_versions = 4;
}

message UnregisterConsumerResponse {}

message GetGrpcViewRequest {
  string service_name = 1;
}

message GetGrpcViewResponse {
  string service_name = 1;
  repeated GrpcServiceView services = 2;
}

message GrpcServiceView {
  string name = 1;
  repeated GrpcMethodView methods = 2;
}

message GrpcMethodView {
  string name = 1;
  GrpcMessageView input = 2;
  GrpcMessageView output = 3;
  repeated string consumers = 4;
}

message GrpcMessageView {
  string name = 1;
  repeated GrpcFieldView fields = 2;
}

message GrpcFieldView {
  string name = 1;
  string type = 2;
  uint32 number = 3;
  repeated string consumers = 4;
}

message ListServicesRequest {}

message ListServicesResponse {
  repeated ServiceInfo services = 1;
}

message ServiceInfo {
  string id = 1;
  string name = 2;
}

message ValidateProtocolRequest {
  string service_name = 1;
  ProtocolType protocol_type = 2;
  repeated ProtoFile files = 3;
  string entry_point = 4;
  repeated string against_versions = 5;
}

message VersionViolation {
  string version = 1;
  repeated ConsumerViolation consumers = 2;
}

message ConsumerViolation {
  string consumer_name = 1;
  repeated string violations = 2;
}

message ValidateProtocolResponse {
  bool valid = 1;
  repeated VersionViolation version_violations = 2;
}
