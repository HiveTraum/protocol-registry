version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/user/protocol_registry/pkg/api
plugins:
  - remote: buf.build/protocolbuffers/go
    out: pkg/api
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: pkg/api
    opt: paths=source_relative
inputs:
  - directory: api/proto
